id           = "2SSK/todoist"
name         = "Todoist"
version      = "2.0.0"
min_noctalia = "5.0.0"
author       = "2SSK"
license      = "MIT"
icon         = "clipboard-check"
tags         = ["productivity", "todo"]
description  = "A lightweight todo list with multi-page organization and priorities."

[[setting]]
key             = "show_completed"
type            = "bool"
label_key       = "settings.show_completed.label"
description_key = "settings.show_completed.description"
default         = true

[[setting]]
key             = "use_custom_colors"
type            = "bool"
label_key       = "settings.use_custom_colors.label"
description_key = "settings.use_custom_colors.description"
default         = false

[[setting]]
key          = "color_high"
type         = "color"
label_key    = "settings.color_high.label"
default      = "#f44336"
visible_when = { key = "use_custom_colors", values = ["true"] }

[[setting]]
key          = "color_medium"
type         = "color"
label_key    = "settings.color_medium.label"
default      = "#2196f3"
visible_when = { key = "use_custom_colors", values = ["true"] }

[[setting]]
key          = "color_low"
type         = "color"
label_key    = "settings.color_low.label"
default      = "#9e9e9e"
visible_when = { key = "use_custom_colors", values = ["true"] }

# Headless service: owns todo/page data, persists to disk, publishes state.
[[service]]
id    = "data"
entry = "data.luau"

# Side panel: list, tabs, inline add/edit, and page management.
[[panel]]
id        = "panel"
entry     = "panel.luau"
width     = 420
height    = "fill"
placement = "floating"
position  = "center_right"

# Bar tile: active count, click opens the panel.
[[widget]]
id    = "todo"
entry = "widget.luau"
